name: Build Otzaria + AI Installer

# סקריפט בנייה אוטומטי שמייצר את ה-installer הסופי.
# מופעל ע"י push לגירסת tag (v*) או ידנית מ-GitHub UI.
#
# הפלט: artifact בשם `otzaria-with-ai-installer` שמכיל את ה-.exe
# המוכן להורדה ע"י המשתמשים.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      profile:
        description: 'AI profile (low/standard/high)'
        required: true
        default: 'standard'

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout otzaria-ai
        uses: actions/checkout@v4
        with:
          path: otzaria-ai

      - name: Checkout otzaria
        uses: actions/checkout@v4
        with:
          repository: Otzaria/otzaria
          ref: migrationDB_V2  # branch פעיל - 0.9.90, SQLite, plugin system
          path: otzaria

      - name: Apply AI integration patch
        shell: pwsh
        working-directory: otzaria-ai
        run: |
          $otzariaPath = Resolve-Path "..\otzaria"
          .\integration\apply_integration.ps1 -OtzariaPath $otzariaPath.Path

      - name: Fix Otzaria pubspec dependency conflicts (only if needed)
        shell: pwsh
        working-directory: otzaria
        run: |
          # ב-migrationDB_V2 כבר יש fix-עצמי ל-analyzer/matcher.
          # ב-main (0.9.71) ישנים נדרש patch ידני. אנחנו בודקים בעדינות.
          $pubspec = Get-Content "pubspec.yaml" -Raw -Encoding UTF8
          $changed = $false

          # פתרון רק אם test pinned לגרסה ישנה שלא תואמת
          if ($pubspec -match "^\s*test:\s*\^1\.2[0-9]") {
            $pubspec = $pubspec -replace "^(\s*)test:\s*\^1\.2[0-9]\.\d+", "# `$&  # disabled by AI build"
            $changed = $true
            Write-Host "  patched test version pin"
          }

          # מוסיפים overrides רק אם חסרים לגמרי
          if ($pubspec -notmatch "analyzer:\s*(any|\^[78])") {
            if ($pubspec -match "dependency_overrides:") {
              $pubspec = $pubspec -replace "(dependency_overrides:\s*\r?\n)", "`$1  analyzer: any`n  test_api: ^0.7.10`n"
              $changed = $true
              Write-Host "  added analyzer/test_api overrides"
            }
          }

          if ($changed) {
            Set-Content -Path "pubspec.yaml" -Value $pubspec -Encoding UTF8 -NoNewline
          } else {
            Write-Host "  no fix needed (V2 has its own overrides)"
          }

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          flutter-version: '3.41.5'

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y

      - name: Cache pip wheels
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: pip-${{ runner.os }}-${{ hashFiles('otzaria-ai/dicta_service/requirements.txt') }}

      - name: Install Python dependencies
        shell: pwsh
        working-directory: otzaria-ai
        run: |
          python -m pip install --upgrade pip
          pip install torch==2.4.1 --index-url https://download.pytorch.org/whl/cpu
          pip install -r dicta_service\requirements.txt
          pip install pyinstaller==6.10.0

      - name: Build AI sidecar
        shell: pwsh
        working-directory: otzaria-ai
        run: |
          python -m PyInstaller build_pipeline\otzaria-ai.spec --noconfirm --clean --distpath dist --workpath build
          if (-not (Test-Path "dist\otzaria-ai\otzaria-ai.exe")) {
            Write-Error "sidecar build failed"
            exit 1
          }

      - name: Download Dicta models for bundling
        shell: pwsh
        working-directory: otzaria-ai
        run: |
          $tinyDir = "dist\bundled_models\dicta-il--dictabert-tiny"
          $jointDir = "dist\bundled_models\dicta-il--dictabert-tiny-joint"
          New-Item -ItemType Directory -Force -Path $tinyDir, $jointDir | Out-Null

          $tinyFiles = @("config.json", "tokenizer.json", "tokenizer_config.json",
                         "vocab.txt", "special_tokens_map.json", "model.safetensors")
          foreach ($f in $tinyFiles) {
            $url = "https://huggingface.co/dicta-il/dictabert-tiny/resolve/main/$f"
            Write-Host "↓ tiny/$f"
            Invoke-WebRequest -Uri $url -OutFile (Join-Path $tinyDir $f) -UseBasicParsing
          }

          foreach ($f in $tinyFiles) {
            $url = "https://huggingface.co/dicta-il/dictabert-tiny-joint/resolve/main/$f"
            Write-Host "↓ tiny-joint/$f"
            Invoke-WebRequest -Uri $url -OutFile (Join-Path $jointDir $f) -UseBasicParsing
          }

          # קבצי Python של joint (מrepo dictabert-joint, לא tiny-joint)
          $pyFiles = @("BertForJointParsing.py", "BertForMorphTagging.py",
                       "BertForPrefixMarking.py", "BertForSyntaxParsing.py")
          foreach ($f in $pyFiles) {
            $url = "https://huggingface.co/dicta-il/dictabert-joint/resolve/main/$f"
            Write-Host "↓ tiny-joint/$f (from dictabert-joint)"
            Invoke-WebRequest -Uri $url -OutFile (Join-Path $jointDir $f) -UseBasicParsing
          }

          Write-Host ""
          Write-Host "=== bundled models size ==="
          Get-ChildItem dist\bundled_models -Recurse -File | Measure-Object Length -Sum |
              ForEach-Object { "{0:N1} MB" -f ($_.Sum / 1MB) }

      - name: Build Flutter Windows release
        shell: pwsh
        working-directory: otzaria
        run: |
          flutter pub get
          flutter build windows --release

      - name: Run Inno Setup
        shell: pwsh
        working-directory: otzaria-ai\build_pipeline
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" otzaria-with-ai.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: otzaria-with-ai-installer
          path: otzaria-ai/dist/otzaria-*-windows-with-ai.exe
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: otzaria-ai/dist/otzaria-*-windows-with-ai.exe
          generate_release_notes: true
